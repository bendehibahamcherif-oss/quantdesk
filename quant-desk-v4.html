<script id="app-source" type="text/template">

/* ═══════════════════════════════════════════════════════
   QUANT⚡DESK — Dashboard Options Intraday
   Stratégie: Contrarian Mean Reversion
═══════════════════════════════════════════════════════ */

const { useState, useEffect, useCallback } = React;
const {
  BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
  ReferenceLine, Cell, AreaChart, Area, CartesianGrid
} = Recharts;

// ─── THEME ───────────────────────────────────────────────
const T = {
  bg:"#060810", surface:"#0b0f1e", card:"#0e1425",
  border:"#16213a", borderHover:"#243660",
  green:"#00e676", greenDim:"#00b04a",
  red:"#ff3d71", redDim:"#c0293a",
  amber:"#ffab00", blue:"#40c4ff", blueDim:"#1e6a9a",
  purple:"#ce93d8", text:"#c8d6f5", muted:"#3d5080", white:"#e8f0ff",
};

// ─── FETCH ───────────────────────────────────────────────
const PROXY = "https://corsproxy.io/?";
const MARKET = ["SPY","QQQ","^VIX"];
const REFRESH_MS = 30000;

async function yfChart(ticker, range) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=${range}`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  const json = await res.json();
  const r = json.chart && json.chart.result && json.chart.result[0];
  if (!r) throw new Error("Pas de données pour " + ticker);
  const closes = r.indicators.quote[0].close;
  const ts = r.timestamp || [];
  const pairs = closes
    .map((c, i) => ({ close: c, date: ts[i] ? new Date(ts[i] * 1000) : null }))
    .filter(d => d.close !== null && !isNaN(d.close));
  return { closes: pairs.map(d => d.close), dates: pairs.map(d => d.date) };
}

async function yfQuotes(symbols) {
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(",")}`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  const json = await res.json();
  const list = (json.quoteResponse && json.quoteResponse.result) || [];
  const out = {};
  list.forEach(q => { out[q.symbol] = q; });
  return out;
}

// ─── MATH ─────────────────────────────────────────────────
function stdDev(arr) {
  if (!arr || arr.length < 2) return 1;
  const n = arr.length;
  const m = arr.reduce((a, b) => a + b, 0) / n;
  return Math.sqrt(arr.reduce((a, b) => a + (b - m) * (b - m), 0) / n) || 1;
}

function calcRSI(closes, p = 14) {
  if (!closes || closes.length < p + 1) return 50;
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = closes[i] - closes[i - 1];
    d > 0 ? (g += d) : (l -= d);
  }
  let ag = g / p, al = l / p;
  for (let i = p + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (p - 1) + Math.max(d, 0)) / p;
    al = (al * (p - 1) + Math.max(-d, 0)) / p;
  }
  return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
}

function calcEMA(closes, p) {
  if (!closes || closes.length === 0) return 0;
  const k = 2 / (p + 1);
  return closes.reduce((e, c, i) => i === 0 ? c : c * k + e * (1 - k), closes[0]);
}

function calcBollinger(closes, p=20, mult=2) {
  if (!closes || closes.length < p) return { pctB:0.5, mid:0 };
  const slice = closes.slice(-p);
  const mid = slice.reduce((a,b)=>a+b,0)/p;
  const sd = Math.sqrt(slice.reduce((a,b)=>a+(b-mid)*(b-mid),0)/p);
  const upper = mid+mult*sd, lower = mid-mult*sd;
  const last = closes[closes.length-1];
  return { pctB: sd===0?0.5:+((last-lower)/(upper-lower)).toFixed(4), upper, lower, mid };
}
function calcStochRSI(closes, rsiP=14, stP=14) {
  if (!closes || closes.length < rsiP+stP+1) return { k:50 };
  let g=0, l=0;
  for(let i=1;i<=rsiP;i++){const d=closes[i]-closes[i-1];d>0?g+=d:l-=d;}
  let ag=g/rsiP, al=l/rsiP;
  const rsiS=[al===0?100:100-100/(1+ag/al)];
  for(let i=rsiP+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(rsiP-1)+Math.max(d,0))/rsiP;
    al=(al*(rsiP-1)+Math.max(-d,0))/rsiP;
    rsiS.push(al===0?100:100-100/(1+ag/al));
  }
  const sl=rsiS.slice(-stP), mn=Math.min(...sl), mx=Math.max(...sl);
  return { k: mx===mn?50:+((rsiS[rsiS.length-1]-mn)/(mx-mn)*100).toFixed(1) };
}
function calcMFI(closes, p=14) {
  if (!closes || closes.length < p+1) return 50;
  let pos=0, neg=0;
  for(let i=closes.length-p;i<closes.length;i++){
    closes[i]>closes[i-1]?pos+=closes[i]:neg+=closes[i];
  }
  return neg===0?100:+(100-100/(1+pos/neg)).toFixed(1);
}
function calcCompositeEntry(closes, rsi) {
  if (!closes || closes.length < 30) return { score:0, count:0, conditions:[] };
  const bb    = calcBollinger(closes.slice(-30), 20, 2);
  const stoch = calcStochRSI(closes.slice(-50), 14, 14);
  const mfi   = calcMFI(closes.slice(-30), 14);
  const last  = closes[closes.length-1];
  const conditions = [
    { name:'RSI14 < 35',      met: rsi < 35,       value: rsi.toFixed(1),          weight: 20 },
    { name:'%B Boll < 0.10',  met: bb.pctB < 0.10, value: bb.pctB.toFixed(3),      weight: 25 },
    { name:'StochRSI < 20',   met: stoch.k < 20,   value: stoch.k.toFixed(1),      weight: 20 },
    { name:'Prix < VWAP',     met: last < bb.mid,  value: last<bb.mid?'OUI':'NON', weight: 20 },
    { name:'MFI < 25',        met: mfi < 25,       value: mfi.toFixed(1),          weight: 15 },
  ];
  const count = conditions.filter(x=>x.met).length;
  const score = conditions.filter(x=>x.met).reduce((a,x)=>a+x.weight, 0);
  return { score, count, conditions };
}
function buildHistogram(returns, bucket = 0.5) {
  const counts = {};
  returns.forEach(r => {
    const b = +(Math.round(r / bucket) * bucket).toFixed(1);
    counts[b] = (counts[b] || 0) + 1;
  });
  const total = returns.length;
  return Object.keys(counts)
    .map(k => ({ ret: +k, count: counts[k], freq: (counts[k] / total) * 100 }))
    .sort((a, b) => a.ret - b.ret);
}

function computeSignals(closes, dayReturn) {
  if (!closes || closes.length < 60) return null;
  const rets = closes.slice(1).map((c, i) => ((c - closes[i]) / closes[i]) * 100);
  const hist = buildHistogram(rets);
  const target = hist.reduce((m, b) => b.count > m.count ? b : m, hist[0]);
  const sd = stdDev(rets);
  const recentVol = stdDev(rets.slice(-20));
  const pctPos = (rets.filter(r => r > 0).length / rets.length) * 100;
  return {
    rets, hist, target,
    targetRet: target.ret,
    targetFreq: target.freq,
    std: sd,
    dev: dayReturn - target.ret,
    devZ: (dayReturn - target.ret) / sd,
    pctPositive: pctPos,
    rsi: calcRSI(closes.slice(-50), 14),
    ema20: calcEMA(closes.slice(-30), 20),
    ema50: calcEMA(closes.slice(-70), 50),
    volRegime: recentVol > sd * 1.3 ? "HIGH" : recentVol < sd * 0.7 ? "LOW" : "NORMAL",
    dayReturn,
    composite: calcCompositeEntry(closes, calcRSI(closes.slice(-50), 14)),
  };
}

function calcMLScore(sig, vix) {
  if (!sig) return 50;
  let s = 50;
  const dz = sig.devZ;
  if (dz < -2.5) s += 28; else if (dz < -2) s += 22; else if (dz < -1.5) s += 15; else if (dz < -1) s += 8;
  else if (dz > 2) s -= 20; else if (dz > 1.5) s -= 12; else if (dz > 1) s -= 6;
  const r = sig.rsi;
  if (r < 25) s += 20; else if (r < 32) s += 13; else if (r < 42) s += 6;
  else if (r > 75) s -= 18; else if (r > 65) s -= 8;
  if (vix !== undefined) {
    if (vix < 15) s += 6; else if (vix > 30) s -= 14; else if (vix > 25) s -= 8; else if (vix > 20) s -= 3;
  }
  if (sig.ema20 > sig.ema50) s += 5; else s -= 4;
  if (sig.volRegime === "HIGH") s -= 6;
  if (sig.pctPositive > 55) s += 4; else if (sig.pctPositive < 45) s -= 4;
  return Math.max(0, Math.min(100, Math.round(s)));
}

// ─── BACKTEST ─────────────────────────────────────────────
function runBacktest({ closes, dates, threshold, holdDays, stopLoss, minObs }) {
  const allRets = closes.slice(1).map((c, i) => ((c - closes[i]) / closes[i]) * 100);
  const hist = buildHistogram(allRets);
  const target = hist.reduce((m, b) => b.count > m.count ? b : m, hist[0]);
  const sd = stdDev(allRets);
  const trades = [];
  let i = Math.max(minObs, 60);
  while (i < closes.length - 1) {
    const dayRet = ((closes[i] - closes[i - 1]) / closes[i - 1]) * 100;
    const devZ = (dayRet - target.ret) / sd;
    if (devZ <= threshold) {
      const entry = closes[i];
      const entryDate = dates[i];
      let exitIdx = Math.min(i + holdDays, closes.length - 1);
      let stopped = false;
      let exitPrice = closes[exitIdx];
      if (stopLoss !== null) {
        for (let k = i + 1; k <= i + holdDays && k < closes.length; k++) {
          const pct = ((closes[k] - entry) / entry) * 100;
          if (pct <= stopLoss) { exitIdx = k; stopped = true; exitPrice = +(entry*(1+stopLoss/100)).toFixed(4); break; }
        }
      }
      if (!stopped) exitPrice = closes[exitIdx];
      const returnPct = +((exitPrice - entry) / entry * 100).toFixed(3);
      trades.push({ idx: i, entryPrice: entry, exitPrice, entryDate, exitDate: dates[exitIdx], returnPct, dayRet: +dayRet.toFixed(2), devZ: +devZ.toFixed(2), holdActual: exitIdx - i, stopped });
      i = exitIdx + 1;
    } else { i++; }
  }
  if (!trades.length) return { trades: [], stats: null };
  const rets = trades.map(t => t.returnPct);
  const wins = trades.filter(t => t.returnPct > 0);
  const avgRet = rets.reduce((a, b) => a + b, 0) / rets.length;
  const sdRet = stdDev(rets);
  const avgHold = trades.reduce((a, t) => a + t.holdActual, 0) / trades.length;
  let equity = 100, peak = 100, maxDD = 0;
  const equityCurve = trades.map((t, idx) => {
    equity = +(equity * (1 + t.returnPct / 100)).toFixed(2);
    if (equity > peak) peak = equity;
    const dd = ((equity - peak) / peak) * 100;
    if (dd < maxDD) maxDD = dd;
    return { n: idx + 1, equity, ret: t.returnPct, date: t.exitDate ? t.exitDate.toLocaleDateString("fr-FR") : "" };
  });
  const byDev = {};
  trades.forEach(t => { const b = Math.floor(t.devZ); if (!byDev[b]) byDev[b] = []; byDev[b].push(t.returnPct); });
  const devAnalysis = Object.keys(byDev).map(k => {
    const arr = byDev[k];
    return { devBucket: +k, avgRet: +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2), count: arr.length, winRate: +(arr.filter(r => r > 0).length / arr.length * 100).toFixed(0) };
  }).sort((a, b) => a.devBucket - b.devBucket);
  const sortedRets = [...rets].sort((a, b) => a - b);
  return {
    trades, equityCurve, retHist: buildHistogram(rets, 0.5), devAnalysis,
    stats: {
      total: trades.length, winRate: +(wins.length / trades.length * 100).toFixed(1),
      avgRet: +avgRet.toFixed(3), medRet: +sortedRets[Math.floor(sortedRets.length / 2)].toFixed(3),
      best: +Math.max(...rets).toFixed(2), worst: +Math.min(...rets).toFixed(2),
      maxDD: +maxDD.toFixed(2), sharpe: +(sdRet > 0 ? (avgRet / sdRet) * Math.sqrt(252 / avgHold) : 0).toFixed(2),
      totalReturn: +(equity - 100).toFixed(2), avgHold: +avgHold.toFixed(1),
      stopHits: trades.filter(t => t.stopped).length,
    },
  };
}

// ─── AI ───────────────────────────────────────────────────
async function runAI(ticker, sig, score, mkt, apiKey) {
  if (!apiKey) return { recommendation: "CLÉ MANQUANTE", reason: "Entrez votre clé API via ⚙️ en haut à droite." };
  const prompt = `Analyste quant options intraday. Stratégie contrarian mean reversion. JSON strict sans backticks ni texte autour.
TICKER:${ticker}|Modal:${sig.targetRet.toFixed(2)}%(${sig.targetFreq.toFixed(1)}%)|Session:${sig.dayReturn.toFixed(2)}%|Dév:${sig.devZ.toFixed(2)}σ|RSI:${sig.rsi.toFixed(1)}|Mom:${sig.ema20 > sig.ema50 ? "bull" : "bear"}|VIX:${(mkt.vix || 0).toFixed(1)}|SPY:${(mkt.spy || 0).toFixed(2)}%|QQQ:${(mkt.qqq || 0).toFixed(2)}%|ML:${score}/100
{"regime":"FAVORABLE|NEUTRE|DEFAVORABLE","signal_force":"FORT|MODERE|FAIBLE|ABSENT","recommendation":"ENTRER|ATTENDRE|EVITER","entry_point":"court","risk":"FAIBLE|MODERE|ELEVE","reason":"1-2 phrases","catalyst":"catalyseur"}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 400, messages: [{ role: "user", content: prompt }] }),
    });
    const d = await res.json();
    if (d.error) return { recommendation: "ERREUR", reason: "Clé API invalide ou quota dépassé. Vérifiez console.anthropic.com" };
    return JSON.parse((d.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim());
  } catch (e) { return { recommendation: "ERREUR", reason: "Erreur réseau. Vérifiez votre connexion." }; }
}

// ─── UI HELPERS ───────────────────────────────────────────
const fmtPct = (v, d = 2) => `${v > 0 ? "+" : ""}${(+v).toFixed(d)}%`;
const fmtUsd = v => `$${(+v).toFixed(2)}`;
const fmtVol = v => v >= 1e9 ? `${(v / 1e9).toFixed(1)}B` : v >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : `${(v / 1e3).toFixed(0)}K`;
const cVal = v => v > 0 ? T.green : v < 0 ? T.red : T.muted;
const cScore = s => s >= 70 ? T.green : s >= 50 ? T.amber : T.red;
const cRec = r => r === "ENTRER" ? T.green : r === "EVITER" ? T.red : T.amber;
const cRegime = r => r === "FAVORABLE" ? T.green : r === "DEFAVORABLE" ? T.red : T.amber;
const cRisk = r => r === "FAIBLE" ? T.green : r === "ELEVE" ? T.red : T.amber;
const cVix = v => v > 30 ? T.red : v > 20 ? T.amber : T.green;
const cRsi = r => r < 35 ? T.green : r > 65 ? T.red : T.muted;

// ─── COMPONENTS ───────────────────────────────────────────
function Stat({ label, value, sub, color, glow }) {
  return (
    <div style={{ padding: "6px 0" }}>
      <div style={{ fontSize: 8, color: T.muted, letterSpacing: 1.5, marginBottom: 2 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: color || T.text, textShadow: glow ? `0 0 8px ${color}88` : "none" }}>{value}</div>
      {sub && <div style={{ fontSize: 9, color: T.muted, marginTop: 1 }}>{sub}</div>}
    </div>
  );
}

function KpiCard({ label, value, sub, color }) {
  return (
    <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 6, padding: "10px 14px" }}>
      <div style={{ fontSize: 8, color: T.muted, letterSpacing: 1.5, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 800, fontFamily: "monospace", color: color || T.text }}>{value}</div>
      {sub && <div style={{ fontSize: 9, color: T.muted, marginTop: 3 }}>{sub}</div>}
    </div>
  );
}

function PBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ padding: "5px 11px", borderRadius: 4, cursor: "pointer", fontSize: 11, fontWeight: 700, border: `1px solid ${active ? T.blue + "66" : T.border}`, background: active ? T.blue + "18" : T.surface, color: active ? T.blue : T.muted }}>
      {label}
    </button>
  );
}

function HistoChart({ hist, targetRet, dayReturn }) {
  if (!hist || hist.length === 0) return <div style={{ height: 90, display: "flex", alignItems: "center", justifyContent: "center", color: T.muted, fontSize: 11 }}>Chargement...</div>;
  const visible = hist.filter(b => b.ret >= -5 && b.ret <= 5);
  const dayBucket = dayReturn !== undefined ? +(Math.round(dayReturn / 0.5) * 0.5).toFixed(1) : null;
  const TT = ({ active, payload }) => {
    if (!active || !payload?.[0]) return null;
    const d = payload[0].payload;
    return <div style={{ background: T.card, border: `1px solid ${T.borderHover}`, padding: "5px 10px", borderRadius: 4, fontSize: 10 }}><div style={{ color: T.muted }}>Rend <span style={{ color: T.text, fontFamily: "monospace" }}>{d.ret >= 0 ? "+" : ""}{d.ret.toFixed(1)}%</span></div><div style={{ color: T.muted }}>Fréq <span style={{ color: T.blue }}>{d.freq.toFixed(1)}%</span></div></div>;
  };
  return (
    <ResponsiveContainer width="100%" height={90}>
      <BarChart data={visible} margin={{ top: 2, right: 2, left: -28, bottom: 0 }}>
        <XAxis dataKey="ret" tick={{ fontSize: 8, fill: T.muted, fontFamily: "monospace" }} tickFormatter={v => `${v}%`} interval={2} />
        <YAxis tick={{ fontSize: 8, fill: T.muted }} />
        <Tooltip content={<TT />} cursor={{ fill: T.borderHover + "44" }} />
        <ReferenceLine x={targetRet} stroke={T.green} strokeDasharray="4 2" strokeWidth={1.5} />
        {dayBucket !== null && dayBucket !== targetRet && <ReferenceLine x={dayBucket} stroke={T.amber} strokeDasharray="3 3" strokeWidth={1.5} />}
        <Bar dataKey="freq" radius={[2, 2, 0, 0]} maxBarSize={12}>
          {visible.map((b, i) => <Cell key={i} fill={Math.abs(b.ret - targetRet) < 0.3 ? T.greenDim : (dayBucket !== null && Math.abs(b.ret - dayBucket) < 0.3 ? T.amber + "cc" : (b.ret < 0 ? T.redDim + "99" : T.blueDim + "99"))} />)}
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

function BacktestPanel({ historical, tickers }) {
  const [ticker, setTicker] = useState(tickers[0] || "");
  const [threshold, setThreshold] = useState(-1.5);
  const [holdDays, setHoldDays] = useState(3);
  const [stopLoss, setStopLoss] = useState(null);
  const [minObs, setMinObs] = useState(126);
  const [results, setResults] = useState(null);
  const [running, setRunning] = useState(false);
  const [subTab, setSubTab] = useState("equity");
  const [page, setPage] = useState(0);
  const PAGE = 10;

  useEffect(() => { if (!tickers.includes(ticker) && tickers.length > 0) setTicker(tickers[0]); }, [tickers]);

  const run = () => {
    const h = historical[ticker];
    if (!h?.closes?.length) return;
    setRunning(true); setResults(null); setPage(0);
    setTimeout(() => { setResults(runBacktest({ closes: h.closes, dates: h.dates, threshold, holdDays, stopLoss, minObs })); setRunning(false); }, 50);
  };

  const { trades = [], stats = null, equityCurve = [], retHist = [], devAnalysis = [] } = results || {};
  const pageTrades = [...trades].reverse().slice(page * PAGE, (page + 1) * PAGE);
  const totalPages = Math.ceil(trades.length / PAGE);

  const STBtn = ({ id, label }) => (
    <button onClick={() => setSubTab(id)} style={{ padding: "6px 14px", borderRadius: 4, cursor: "pointer", fontSize: 11, fontWeight: 700, background: subTab === id ? T.purple + "22" : T.surface, border: `1px solid ${subTab === id ? T.purple + "55" : T.border}`, color: subTab === id ? T.purple : T.muted }}>
      {label}
    </button>
  );

  const EqTT = ({ active, payload }) => {
    if (!active || !payload?.[0]) return null;
    const d = payload[0].payload;
    return <div style={{ background: T.card, border: `1px solid ${T.borderHover}`, padding: "6px 10px", borderRadius: 4, fontSize: 10 }}><div style={{ color: T.muted }}>Trade #{d.n}</div><div style={{ color: T.white, fontFamily: "monospace", fontWeight: 700 }}>Equity {d.equity.toFixed(2)}</div><div style={{ color: cVal(d.ret), fontFamily: "monospace" }}>{fmtPct(d.ret)}</div>{d.date && <div style={{ color: T.muted }}>{d.date}</div>}</div>;
  };
  const RhTT = ({ active, payload }) => {
    if (!active || !payload?.[0]) return null;
    const d = payload[0].payload;
    return <div style={{ background: T.card, border: `1px solid ${T.borderHover}`, padding: "5px 10px", borderRadius: 4, fontSize: 10 }}><div style={{ color: T.muted }}>Retour <span style={{ color: T.text, fontFamily: "monospace" }}>{d.ret >= 0 ? "+" : ""}{d.ret.toFixed(1)}%</span></div><div style={{ color: T.muted }}>{d.count} trades · {d.freq.toFixed(1)}%</div></div>;
  };

  return (
    <div>
      <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 8, padding: "16px 20px", marginBottom: 16 }}>
        <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: T.muted, marginBottom: 14 }}>PARAMÈTRES BACKTEST</div>
        <div style={{ display: "flex", gap: 18, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: 1, marginBottom: 6 }}>TICKER</div>
            <select value={ticker} onChange={e => setTicker(e.target.value)} style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.white, padding: "7px 12px", borderRadius: 5, fontSize: 13, fontFamily: "monospace", cursor: "pointer" }}>
              {tickers.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: 1, marginBottom: 6 }}>SEUIL ENTRÉE (σ)</div>
            <div style={{ display: "flex", gap: 4 }}>{[-1.0, -1.5, -2.0, -2.5, -3.0].map(v => <PBtn key={v} label={`${v}σ`} active={threshold === v} onClick={() => setThreshold(v)} />)}</div>
          </div>
          <div>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: 1, marginBottom: 6 }}>DURÉE</div>
            <div style={{ display: "flex", gap: 4 }}>{[1, 2, 3, 5, 7, 10].map(v => <PBtn key={v} label={`${v}j`} active={holdDays === v} onClick={() => setHoldDays(v)} />)}</div>
          </div>
          <div>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: 1, marginBottom: 6 }}>STOP LOSS</div>
            <div style={{ display: "flex", gap: 4 }}>{[null, -2, -3, -5, -8].map(v => <PBtn key={v ?? "n"} label={v === null ? "Aucun" : `${v}%`} active={stopLoss === v} onClick={() => setStopLoss(v)} />)}</div>
          </div>
          <div>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: 1, marginBottom: 6 }}>WARMUP</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[[63, "3m"], [126, "6m"], [252, "1a"]].map(([v, l]) => <PBtn key={v} label={l} active={minObs === v} onClick={() => setMinObs(v)} />)}

            <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${T.border}`, display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 9, color: T.muted, letterSpacing: 2 }}>JOURNAL ({trades.length} trades)</span>
                <span style={{ fontSize: 10, color: T.muted }}>Page {page + 1}/{totalPages}</span>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${T.border}` }}>
                      {["#", "DATE ENT.", "DATE SORT.", "ENT.", "SORT.", "RETOUR", "DÉV.", "DURÉE", "STOP"].map(h => (
                        <th key={h} style={{ padding: "8px 12px", textAlign: "left", fontSize: 8, color: T.muted, letterSpacing: 1, fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {pageTrades.map((t, i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${T.border}`, background: i % 2 === 0 ? "transparent" : T.surface + "88" }}>
                        <td style={{ padding: "7px 12px", color: T.muted, fontFamily: "monospace", fontSize: 10 }}>{trades.length - (page * PAGE + i)}</td>
                        <td style={{ padding: "7px 12px", color: T.muted, fontSize: 10, whiteSpace: "nowrap" }}>{t.entryDate?.toLocaleDateString("fr-FR") || "—"}</td>
                        <td style={{ padding: "7px 12px", color: T.muted, fontSize: 10, whiteSpace: "nowrap" }}>{t.exitDate?.toLocaleDateString("fr-FR") || "—"}</td>
                        <td style={{ padding: "7px 12px", fontFamily: "monospace", color: T.text }}>{fmtUsd(t.entryPrice)}</td>
                        <td style={{ padding: "7px 12px", fontFamily: "monospace", color: T.text }}>{fmtUsd(t.exitPrice)}</td>
                        <td style={{ padding: "7px 12px", fontFamily: "monospace", fontWeight: 700, color: cVal(t.returnPct) }}>{fmtPct(t.returnPct)}</td>
                        <td style={{ padding: "7px 12px", fontFamily: "monospace", color: t.devZ <= -2 ? T.green : T.muted }}>{t.devZ.toFixed(2)}σ</td>
                        <td style={{ padding: "7px 12px", color: T.muted, fontFamily: "monospace" }}>{t.holdActual}j</td>
                        <td style={{ padding: "7px 12px" }}>{t.stopped ? <span style={{ color: T.red, fontSize: 9, fontWeight: 700 }}>STOP</span> : <span style={{ color: T.muted, fontSize: 9 }}>—</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ padding: "10px 16px", display: "flex", gap: 8, borderTop: `1px solid ${T.border}` }}>
                <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0} style={{ padding: "5px 12px", borderRadius: 4, cursor: page === 0 ? "not-allowed" : "pointer", background: T.surface, border: `1px solid ${T.border}`, color: page === 0 ? T.muted : T.text, fontSize: 11 }}>← Préc</button>
                <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page >= totalPages - 1} style={{ padding: "5px 12px", borderRadius: 4, cursor: page >= totalPages - 1 ? "not-allowed" : "pointer", background: T.surface, border: `1px solid ${T.border}`, color: page >= totalPages - 1 ? T.muted : T.text, fontSize: 11 }}>Suiv →</button>
              </div>
            </div>
          )}
        </>
      )}
      {results && !stats && <div style={{ textAlign: "center", padding: "40px 0", color: T.amber, fontSize: 12 }}>Aucun trade trouvé. Essayez –1.0σ.</div>}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dashboard");
  const [tickers, setTickers] = useState(["AAPL", "TSLA", "NVDA", "META"]);
  const [histRange, setHistRange] = useState("5y");
  const [historical, setHistorical] = useState({});
  const [quotes, setQuotes] = useState({});
  const [signals, setSignals] = useState({});
  const [scores, setScores] = useState({});
  const [aiData, setAiData] = useState({});
  const [aiLoading, setAiLoading] = useState({});
  const [histLoading, setHistLoading] = useState({});
  const [lastRefresh, setLastRefresh] = useState(null);
  const [newTicker, setNewTicker] = useState("");
  const [inputFocus, setInputFocus] = useState(false);
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("qd_key") || ""; } catch { return ""; } });
  const [showModal, setShowModal] = useState(() => { try { return !localStorage.getItem("qd_key"); } catch { return true; } });
  const [time, setTime] = useState(new Date());

  // Hide splash screen
  useEffect(() => {
    const splash = document.getElementById("splash");
    if (splash) { splash.style.opacity = "0"; setTimeout(() => { splash.style.display = "none"; }, 400); }
    const id = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  const vix = quotes["^VIX"]?.regularMarketPrice;
  const spy = quotes["SPY"];
  const qqq = quotes["QQQ"];

  const loadHistorical = useCallback(async (t) => {
    setHistLoading(prev => ({ ...prev, [t]: true }));
    try {
      const data = await yfChart(t, histRange);
      setHistorical(prev => ({ ...prev, [t]: data }));
    } catch (e) { console.error("Historical " + t, e); }
    setHistLoading(prev => ({ ...prev, [t]: false }));
  }, [histRange]);

  const refresh = useCallback(async () => {
    try {
      const q = await yfQuotes([...tickers, ...MARKET]);
      setQuotes(q);
      setLastRefresh(new Date());
      setSignals(prev => {
        const next = { ...prev };
        tickers.forEach(t => {
          const h = historical[t];
          if (h?.closes?.length > 60) next[t] = computeSignals(h.closes, q[t]?.regularMarketChangePercent || 0);
        });
        return next;
      });
    } catch (e) { console.error("Refresh", e); }
  }, [tickers, historical]);

  useEffect(() => { tickers.forEach(loadHistorical); }, [histRange]);
  useEffect(() => { tickers.forEach(t => { if (!historical[t] && !histLoading[t]) loadHistorical(t); }); }, [tickers]);
  useEffect(() => { refresh(); const id = setInterval(refresh, REFRESH_MS); return () => clearInterval(id); }, [refresh]);
  useEffect(() => {
    const s = {};
    tickers.forEach(t => { if (signals[t]) s[t] = calcMLScore(signals[t], vix); });
    setScores(s);
  }, [signals, vix]);

  const addTicker = () => {
    const t = newTicker.trim().toUpperCase().replace(/[^A-Z^.]/g, "");
    if (t && !tickers.includes(t)) { setTickers(prev => [...prev, t]); setNewTicker(""); }
  };
  const removeTicker = t => {
    setTickers(prev => prev.filter(x => x !== t));
    [setHistorical, setSignals, setScores, setAiData].forEach(fn => fn(prev => { const n = { ...prev }; delete n[t]; return n; }));
  };
  const handleAnalyze = async ticker => {
    if (!signals[ticker]) return;
    setAiLoading(prev => ({ ...prev, [ticker]: true }));
    const r = await runAI(ticker, signals[ticker], scores[ticker] || 50, { vix, spy: spy?.regularMarketChangePercent, qqq: qqq?.regularMarketChangePercent }, apiKey);
    setAiData(prev => ({ ...prev, [ticker]: r }));
    setAiLoading(prev => ({ ...prev, [ticker]: false }));
  };

  const alerts = tickers.filter(t => (scores[t] || 0) >= 70).sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
  const MTab = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ padding: "8px 20px", borderRadius: "6px 6px 0 0", cursor: "pointer", fontSize: 12, fontWeight: 800, letterSpacing: 1, border: `1px solid ${tab === id ? T.blue + "55" : T.border}`, borderBottom: "none", background: tab === id ? T.blue + "18" : T.surface, color: tab === id ? T.blue : T.muted }}>
      {label}
    </button>
  );

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.text }}>
      {showModal && <APIModal current={apiKey} onSave={k => { setApiKey(k); setShowModal(false); }} onClose={() => setShowModal(false)} />}

      {/* Market Bar */}
      <div style={{ background: T.surface, borderBottom: `1px solid ${T.border}`, padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 52, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14, fontWeight: 900, letterSpacing: 3, color: T.white, fontFamily: "monospace" }}>QUANT<span style={{ color: T.green }}>⚡</span>DESK</span>
          <span style={{ fontSize: 8, color: T.muted, letterSpacing: 2 }}>OPTIONS INTRADAY</span>
        </div>
        <div style={{ display: "flex", gap: 24 }}>
          {[{ label: "SPY", q: spy }, { label: "QQQ", q: qqq }, { label: "VIX", q: quotes["^VIX"], isVix: true }].map(({ label, q, isVix }) => (
            <div key={label} style={{ textAlign: "center" }}>
              <div style={{ fontSize: 8, color: T.muted, letterSpacing: 2, marginBottom: 1 }}>{label}</div>
              <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "monospace", color: isVix ? cVix(q?.regularMarketPrice) : cVal(q?.regularMarketChangePercent) }}>
                {q?.regularMarketPrice ? (isVix ? q.regularMarketPrice.toFixed(2) : fmtUsd(q.regularMarketPrice)) : "—"}
              </div>
              <div style={{ fontSize: 9, color: isVix ? cVix(q?.regularMarketPrice) : cVal(q?.regularMarketChangePercent), fontFamily: "monospace" }}>
                {q?.regularMarketChangePercent !== undefined ? fmtPct(q.regularMarketChangePercent) : "—"}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "monospace", color: T.blue }}>{time.toLocaleTimeString("fr-FR")}</div>
            <div style={{ fontSize: 8, color: T.muted }}>{lastRefresh ? `MAJ ${lastRefresh.toLocaleTimeString("fr-FR")}` : "CHARGEMENT"}</div>
          </div>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: T.green, boxShadow: `0 0 8px ${T.green}` }} />
          <button onClick={() => setShowModal(true)} style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.muted, width: 28, height: 28, borderRadius: 5, cursor: "pointer", fontSize: 13 }}>⚙</button>
        </div>
      </div>

      <div style={{ padding: "16px 20px", maxWidth: 1400, margin: "0 auto" }}>
        {/* Controls */}
        <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 6 }}>
            <input value={newTicker} onChange={e => setNewTicker(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && addTicker()} onFocus={() => setInputFocus(true)} onBlur={() => setInputFocus(false)} placeholder="TICKER" maxLength={6}
              style={{ background: T.surface, color: T.white, fontFamily: "monospace", border: `1px solid ${inputFocus ? T.borderHover : T.border}`, padding: "7px 12px", borderRadius: 5, fontSize: 13, width: 100 }} />
            <button onClick={addTicker} style={{ background: T.blue + "18", border: `1px solid ${T.blue}44`, color: T.blue, padding: "7px 14px", borderRadius: 5, cursor: "pointer", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>+ AJOUTER</button>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {["2y", "3y", "5y"].map(r => (
              <button key={r} onClick={() => setHistRange(r)} style={{ background: histRange === r ? T.amber + "18" : T.surface, border: `1px solid ${histRange === r ? T.amber + "66" : T.border}`, color: histRange === r ? T.amber : T.muted, padding: "6px 12px", borderRadius: 5, cursor: "pointer", fontSize: 11, fontWeight: 700 }}>{r.toUpperCase()}</button>
            ))}
          </div>
          <button onClick={refresh} style={{ marginLeft: "auto", background: T.green + "10", border: `1px solid ${T.green}33`, color: T.green, padding: "6px 14px", borderRadius: 5, cursor: "pointer", fontSize: 11, fontWeight: 700 }}>⟳ RAFRAÎCHIR</button>
        </div>

        {alerts.length > 0 && (
          <div style={{ marginBottom: 12, padding: "10px 14px", background: T.green + "0a", border: `1px solid ${T.green}33`, borderRadius: 6, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: T.green }}>⚡ SIGNAUX ACTIFS</span>
            {alerts.map(t => (
              <div key={t} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontSize: 13, color: T.white, fontFamily: "monospace", fontWeight: 700 }}>{t}</span>
                <span style={{ fontSize: 10, fontFamily: "monospace", fontWeight: 700, color: cScore(scores[t]), padding: "1px 6px", background: cScore(scores[t]) + "22", border: `1px solid ${cScore(scores[t])}44`, borderRadius: 3 }}>{scores[t]}/100</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ display: "flex", gap: 2, marginBottom: 0 }}>
          <MTab id="dashboard" label="📊 DASHBOARD LIVE" />
          <MTab id="backtest" label="🔬 BACKTEST" />
        </div>
        <div style={{ border: `1px solid ${T.blue}22`, borderRadius: "0 6px 6px 6px", padding: 16, background: T.blue + "04", marginBottom: 16 }}>
          {tab === "dashboard" && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px,1fr))", gap: 14 }}>
              {tickers.map(t => <TickerCard key={t} ticker={t} quote={quotes[t]} sig={signals[t]} score={scores[t]} onRemove={removeTicker} onAnalyze={handleAnalyze} ai={aiData[t]} aiLoading={!!aiLoading[t]} />)}
            </div>
          )}
          {tab === "backtest" && <BacktestPanel historical={historical} tickers={tickers} />}
        </div>

        <div style={{ padding: "8px 0", borderTop: `1px solid ${T.border}`, display: "flex", justifyContent: "space-between", fontSize: 9, color: T.muted, flexWrap: "wrap", gap: 4 }}>
          <span>DONNÉES : YAHOO FINANCE · PROXY : CORSPROXY.IO · REFRESH 30s</span>
          <span>CLÉ API : <span style={{ color: apiKey ? T.green : T.amber }}>{apiKey ? "✓ CONFIGURÉE" : "⚠ NON CONFIGURÉE"}</span></span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
<script>
(function waitForLibs() {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || 
      typeof Recharts === 'undefined' || typeof Babel === 'undefined') {
    setTimeout(waitForLibs, 100);
    return;
  }
  try {
    var src = document.getElementById('app-source').textContent;
    var compiled = Babel.transform(src, { presets: ['react'] }).code;
    var script = document.createElement('script');
    script.textContent = compiled;
    document.body.appendChild(script);
  } catch(e) {
    var el = document.getElementById('splash-error');
    if (el) { el.style.display = 'block'; el.innerHTML = '⚠️ Erreur compilation : ' + e.message; }
    console.error(e);
  }
})();
</script>
</body>
</html>
